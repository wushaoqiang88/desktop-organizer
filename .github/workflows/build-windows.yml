name: Build Windows Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Create NSIS installer
        run: |
          choco install nsis -y
          cd auto_organize
          makensis installer.nsi
        shell: cmd

      - name: Prepare release artifacts
        run: |
          # 主程序
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "DeskTidy_Windows_x64.zip"
          # 独立归类工具安装包
          Copy-Item "auto_organize\DeskTidy_AutoOrganize_Setup_v1.0.0.exe" -Destination "." -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskTidy-Windows-x64
          path: |
            DeskTidy_Windows_x64.zip
            DeskTidy_AutoOrganize_Setup_v1.0.0.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DeskTidy_Windows_x64.zip
            DeskTidy_AutoOrganize_Setup_v1.0.0.exe
          generate_release_notes: true
