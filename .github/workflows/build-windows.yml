name: Build Windows Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings || true
        continue-on-error: true

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Install NSIS
        run: choco install nsis -y
        shell: pwsh

      - name: Create main app installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: pwsh

      - name: Create standalone organizer installer
        run: |
          cd auto_organize
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: pwsh

      - name: Prepare release artifacts
        run: |
          # 主程序安装包已由 NSIS 生成: DesktopOrganizer_Setup_v1.2.12.exe
          # 独立归类工具安装包
          Copy-Item "auto_organize\DeskTidy_AutoOrganize_Setup_v1.0.0.exe" -Destination "." -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopOrganizer-Windows-x64
          path: |
            DesktopOrganizer_Setup_v1.2.12.exe
            DeskTidy_AutoOrganize_Setup_v1.0.0.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DesktopOrganizer_Setup_v1.2.12.exe
            DeskTidy_AutoOrganize_Setup_v1.0.0.exe
          generate_release_notes: true
